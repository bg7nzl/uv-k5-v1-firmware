on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build firmware (Docker)
        run: |
          docker build -t uvk5 .
          mkdir -p compiled-firmware
          docker run --rm -v "$PWD/compiled-firmware:/app/compiled-firmware" uvk5 \
            /bin/bash -c "cd /app && make && cp firmware* compiled-firmware/"

      - name: Firmware size
        run: |
          docker run --rm -v "$PWD/compiled-firmware:/out" uvk5 \
            arm-none-eabi-size /out/firmware

      - name: Stage packed firmware (single file for artifact)
        id: packed
        run: |
          short="${GITHUB_SHA:0:7}"
          dest="compiled-firmware/bg7nzl-k5v1-${short}.bin"
          cp compiled-firmware/firmware.packed.bin "$dest"
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "file=$dest" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bg7nzl-k5v1-${{ steps.packed.outputs.short }}
          path: ${{ steps.packed.outputs.file }}
          compression-level: 0

      - name: Upload binaries to release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: compiled-firmware/firmware.packed.bin
          asset_name: egzumer_$tag.packed.bin
          tag: ${{ github.ref }}
          overwrite: true
          release_name: release ${{ github.ref_name }}

      - name: Auto release (packed .bin + CurrentReleaseNotes.md)
        if: ${{ success() && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA:0:7}"
          REPO="${{ github.repository }}"
          PACKED_ASSET="${{ steps.packed.outputs.file }}"
          test -f CurrentReleaseNotes.md

          TAG="auto-${SHORT}"
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release delete "${TAG}" --repo "${REPO}" --yes
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" ":refs/tags/${TAG}" || true
          fi

          gh release create "${TAG}" "${PACKED_ASSET}" \
            --repo "${REPO}" \
            --title "Build ${SHORT} (packed firmware)" \
            --notes-file CurrentReleaseNotes.md \
            --target "${GITHUB_SHA}"
